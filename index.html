<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Login</title>
    <link rel="stylesheet" href="styles/login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/login.js"></script>

</head>
<body>
    <div class="Login_Content">
        <div class="Login_Box">
            <div class="Login_Titulo">
                <h1> Inicio de Sesion </h1>
            </div>
            <div class="Login_Datos">
                <p> Usuario </p>
                <input type="text" name="usuario" id="usuario" placeholder="Usuario">
            </div>

            <div class="Login_Datos">
                <p> Contraseña </p>
                <input type="password" name="password" id="password" placeholder="Contraseña">
            </div>

            <br>
            <div class="Login_Links">
                <a href="Gastos/Link/Solicitar_Reiniciar_Pass.html">¿Olvido su contraseña? </a>
            </div>
            <br><br>
            <div class="Login_IniciarSesion">
                <button id="IniciarSesion">INICIAR SESION</button>
                <button onclick="window.location.href='Gastos/Link/Crear_Usuario.html'"> CREAR USUARIO </button>
            </div>
            <br> <br>
        </div>
    </div>

    <footer>
        <p> CONTACTO </p>
    </footer>
</body>
</html>
